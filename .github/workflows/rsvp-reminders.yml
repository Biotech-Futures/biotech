name: Hourly RSVP reminders

# Hits the HMAC-protected dispatcher endpoint every hour. One call fires
# both reminder kinds (24h + 1h) — see services.send_due_rsvp_reminders
# and the REMINDER_KINDS registry.
#
# Required configuration:
#   secret  RSVP_REMINDER_TOKEN         must match backend env of same name
#   var     RSVP_REMINDER_BACKEND_URL   e.g. https://biotechbe.azurewebsites.net
#
# Cron drift of a few minutes is fine — each kind has a 1h capture window.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger RSVP reminder dispatch
        env:
          BACKEND_URL: ${{ vars.RSVP_REMINDER_BACKEND_URL }}
          REMINDER_TOKEN: ${{ secrets.RSVP_REMINDER_TOKEN }}
        run: |
          if [ -z "${BACKEND_URL}" ]; then
            echo "RSVP_REMINDER_BACKEND_URL is not set (repository variable)." >&2
            exit 1
          fi
          if [ -z "${REMINDER_TOKEN}" ]; then
            echo "RSVP_REMINDER_TOKEN is not set (repository secret)." >&2
            exit 1
          fi
          # -f makes curl exit non-zero on HTTP >=400 so the workflow
          # surfaces auth or server failures instead of silently
          # succeeding. -sS keeps output quiet but still prints errors.
          curl -fsS -X POST \
            -H "X-Reminder-Token: ${REMINDER_TOKEN}" \
            -H "Content-Type: application/json" \
            "${BACKEND_URL%/}/events/v1/admin/send-rsvp-reminders/"
