openapi: 3.0.3
info:
  title: BIOTech Futures Mentoring Platform API
  version: 1.0.0
  description: API Documentation for the New BIOTech Futures Mentoring Platform
paths:
  /groups/countries/:
    get:
      operationId: groups_countries_list
      tags:
      - groups
      security:
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
