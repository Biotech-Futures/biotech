components:
  schemas:
    AccountStatusEnum:
      enum:
      - invited
      - pending
      - active
      - suspended
      - deactivated
      type: string
      description: |-
        * `invited` - Invited
        * `pending` - Pending
        * `active` - Active
        * `suspended` - Suspended
        * `deactivated` - Deactivated
    AdminOperationsSummary:
      type: object
      properties:
        track_scope:
          type: array
          items:
            type: integer
            minimum: 1
        active_users:
          type: integer
        invited_or_pending_users:
          type: integer
        suspended_or_deactivated_users:
          type: integer
        active_groups:
          type: integer
        groups_without_mentor:
          type: integer
        unassigned_match_recommendations:
          type: integer
        upcoming_events:
          type: integer
      required:
      - active_groups
      - active_users
      - groups_without_mentor
      - invited_or_pending_users
      - suspended_or_deactivated_users
      - unassigned_match_recommendations
      - upcoming_events
    AuthMessage:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
    BlankEnum:
      enum:
      - ''
    BulkGroupCreate:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/BulkGroupCreateItem'
      required:
      - groups
    BulkGroupCreateItem:
      type: object
      properties:
        group_name:
          type: string
          maxLength: 255
        track:
          type: integer
        member_user_ids:
          type: array
          items:
            type: integer
        mentor_user_id:
          type: integer
          nullable: true
      required:
      - group_name
      - track
    BulkUser:
      type: object
      properties:
        user_ids:
          type: array
          items:
            type: integer
            minimum: 1
      required:
      - user_ids
    BulkUserStatus:
      type: object
      properties:
        user_ids:
          type: array
          items:
            type: integer
            minimum: 1
        account_status:
          $ref: '#/components/schemas/AccountStatusEnum'
      required:
      - account_status
      - user_ids
    BulkUserTrack:
      type: object
      properties:
        user_ids:
          type: array
          items:
            type: integer
            minimum: 1
        track_id:
          type: integer
      required:
      - track_id
      - user_ids
    Country:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        country_name:
          type: string
          maxLength: 255
      required:
      - country_name
      - id
    CreatorRoleEnum:
      enum:
      - global_admin
      - track_admin
      - mentor
      - supervisor
      - student
      type: string
      description: |-
        * `global_admin` - Global Administrator
        * `track_admin` - Track Administrator
        * `mentor` - Mentor
        * `supervisor` - Supervisor
        * `student` - Student
    DashboardGroupPreview:
      type: object
      description: |-
        Flattened, deeply-associated group projection used by the dashboard
        groups-preview endpoint.

        Backed by ``services.get_groups_preview`` which returns an annotated
        queryset (``member_count`` annotation, mentor memberships prefetched
        onto ``MENTOR_MEMBERSHIPS_ATTR``), so this serializer never triggers
        extra queries per row.
      properties:
        id:
          type: integer
        group_name:
          type: string
        track_id:
          type: integer
        track_name:
          type: string
        member_count:
          type: integer
        lead_user:
          type: string
          readOnly: true
        lead_name:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
      required:
      - group_name
      - id
      - lead_name
      - lead_user
      - member_count
      - status
      - track_id
      - track_name
    DashboardNextEvent:
      type: object
      properties:
        id:
          type: integer
        event_name:
          type: string
        description:
          type: string
          nullable: true
        track:
          type: integer
          nullable: true
        groups:
          type: array
          items:
            type: integer
          nullable: true
        event_type:
          type: string
          nullable: true
        start_datetime:
          type: string
          format: date-time
        ends_datetime:
          type: string
          format: date-time
          nullable: true
        location:
          type: string
          nullable: true
        location_link:
          type: string
          format: uri
          nullable: true
        event_image:
          type: string
          format: uri
          nullable: true
        event_format:
          type: string
        rsvp_status:
          type: string
          nullable: true
      required:
      - description
      - ends_datetime
      - event_format
      - event_image
      - event_name
      - event_type
      - groups
      - id
      - location
      - location_link
      - rsvp_status
      - start_datetime
      - track
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event_name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        track:
          type: integer
          nullable: true
        event_type:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EventTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        start_datetime:
          type: string
          format: date-time
        ends_datetime:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
          maxLength: 255
        location_link:
          type: string
          format: uri
          nullable: true
          description: Zoom URL for virtual/hybrid events, Google Maps URL for in-person
            events.
          maxLength: 255
        host_user:
          type: integer
          readOnly: true
          nullable: true
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        event_image:
          type: string
          format: uri
          nullable: true
          maxLength: 255
        event_format:
          $ref: '#/components/schemas/EventFormatEnum'
        event_timezone:
          type: string
          maxLength: 50
        max_attendees:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        accepted_count:
          type: string
          readOnly: true
        waitlist_count:
          type: string
          readOnly: true
        accepted:
          type: string
          readOnly: true
        target_groups:
          type: string
          readOnly: true
        target_tracks:
          type: string
          readOnly: true
        target_roles:
          type: string
          readOnly: true
        target_group_ids:
          type: array
          items:
            type: string
            writeOnly: true
          writeOnly: true
        target_track_ids:
          type: array
          items:
            type: string
            writeOnly: true
          writeOnly: true
        target_role_ids:
          type: array
          items:
            type: string
            writeOnly: true
          writeOnly: true
      required:
      - accepted
      - accepted_count
      - deleted_at
      - ends_datetime
      - event_name
      - host_user
      - id
      - start_datetime
      - target_groups
      - target_roles
      - target_tracks
      - waitlist_count
    EventBulkInvite:
      type: object
      description: Up to 200 invites per call; PENDING is the invite-issued default.
      properties:
        user_ids:
          type: array
          items:
            type: integer
            minimum: 1
          maxItems: 200
          minItems: 1
        rsvp_status:
          allOf:
          - $ref: '#/components/schemas/RsvpStatusAcfEnum'
          default: pending
      required:
      - user_ids
    EventFormatEnum:
      enum:
      - in_person
      - virtual
      - hybrid
      type: string
      description: |-
        * `in_person` - In-person
        * `virtual` - Virtual
        * `hybrid` - Hybrid
    EventRsvp:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          type: integer
        user:
          type: integer
        rsvp_status:
          $ref: '#/components/schemas/RsvpStatusAcfEnum'
        responded_at:
          type: string
          format: date-time
          nullable: true
      required:
      - event
      - id
      - user
    EventRsvpRequest:
      type: object
      description: Admin-side invite payload — PENDING allowed, default.
      properties:
        rsvp_status:
          allOf:
          - $ref: '#/components/schemas/RsvpStatusAcfEnum'
          default: pending
    EventRsvpSubmit:
      type: object
      description: |-
        User-side RSVP payload for POST /api/v1/events/{id}/rsvp/.

        PENDING is excluded — that's an admin-invite state. Restricting
        choices here means a stray `rsvp_status=pending` body is rejected
        with a clean 400 instead of silently overwriting an admin invite.
      properties:
        rsvp_status:
          $ref: '#/components/schemas/EventRsvpSubmitRsvpStatusEnum'
      required:
      - rsvp_status
    EventRsvpSubmitRsvpStatusEnum:
      enum:
      - accepted
      - tentative
      - declined
      type: string
      description: |-
        * `accepted` - Accepted
        * `tentative` - Tentative
        * `declined` - Declined
    EventRsvpUpsert:
      type: object
      properties:
        event:
          type: integer
        user:
          type: integer
        rsvp_status:
          $ref: '#/components/schemas/RsvpStatusAcfEnum'
        responded_at:
          type: string
          format: date-time
          nullable: true
      required:
      - event
      - user
    EventTypeEnum:
      enum:
      - workshop
      - webinar
      - symposium
      - networking
      - social
      - other
      type: string
      description: |-
        * `workshop` - Workshop
        * `webinar` - Webinar
        * `symposium` - Symposium
