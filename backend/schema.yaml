components:
  schemas:
    Country:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        country_name:
          type: string
          maxLength: 255
      required:
      - country_name
      - id
    GroupMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group:
          type: integer
        user:
          type: integer
      required:
      - group
      - id
      - user
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedCountry:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        country_name:
          type: string
          maxLength: 255
    PatchedGroupMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group:
          type: integer
        user:
          type: integer
    PatchedTrack:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        track_name:
          type: string
          maxLength: 255
        state:
          type: integer
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
        status:
          type: boolean
        track:
          type: integer
          nullable: true
        state:
          type: integer
          nullable: true
        current_role_id:
          type: string
          readOnly: true
        current_role_name:
          type: string
          readOnly: true
    Role:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        role_name:
          type: string
          maxLength: 255
      required:
      - id
      - role_name
    RoleAssignmentHistory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/Role'
          readOnly: true
        valid_from:
          type: string
          format: date-time
        valid_to:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: string
          readOnly: true
      required:
      - id
      - is_active
      - role
      - user
      - valid_from
    Track:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        track_name:
          type: string
          maxLength: 255
        state:
          type: integer
      required:
      - id
      - state
      - track_name
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
      required:
      - email
      - first_name
      - id
      - last_name
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
