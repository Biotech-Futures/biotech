openapi: 3.0.3
info:
  title: BIOTech Futures Mentoring Platform API
  version: 1.0.0
  description: API Documentation for the New BIOTech Futures Mentoring Platform
paths:
  /certificates/v1/:
    post:
      operationId: certificates_v1_create
      description: |-
        GET /certificates/v1/{id}/  -> retrieve a single certificate (admin-only)
        POST /certificates/v1/      -> create a new certificate (admin-only)
      tags:
      - certificates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MentorCertificateCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MentorCertificateCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MentorCertificateCreate'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentorCertificateCreate'
          description: ''
  /certificates/v1/{id}/:
    get:
      operationId: certificates_v1_retrieve
      description: |-
        GET /certificates/v1/{id}/  -> retrieve a single certificate (admin-only)
        POST /certificates/v1/      -> create a new certificate (admin-only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Mentor Certificate.
        required: true
      tags:
      - certificates
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentorCertificate'
          description: ''
