components:
  schemas:
    Country:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        country_name:
          type: string
          maxLength: 255
      required:
      - country_name
      - id
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event_name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 255
        start_datetime:
          type: string
          format: date-time
        ends_datetime:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
          maxLength: 255
        humanitix_link:
          type: string
          format: uri
          maxLength: 255
        host_user:
          type: integer
          readOnly: true
          nullable: true
        event_image:
          type: string
          nullable: true
          maxLength: 255
        is_virtual:
          type: boolean
      required:
      - ends_datetime
      - event_name
      - host_user
      - humanitix_link
      - id
      - start_datetime
    Group:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group_name:
          type: string
          maxLength: 255
        track:
          type: integer
        creation_datetime:
          type: string
          format: date-time
          readOnly: true
        deleted_flag:
          type: boolean
          readOnly: true
        deleted_datetime:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - creation_datetime
      - deleted_datetime
      - deleted_flag
      - group_name
      - id
      - track
    GroupMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group:
          type: integer
        user:
          type: integer
      required:
      - group
      - id
      - user
    MentorCertificate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mentor_profile:
          type: integer
          readOnly: true
        certificate_type:
          type: string
          readOnly: true
        certificate_number:
          type: string
          readOnly: true
          nullable: true
        issued_by:
          type: string
          readOnly: true
        issued_at:
          type: string
          format: date
          readOnly: true
        expires_at:
          type: string
          format: date
          readOnly: true
          nullable: true
        file_url:
          type: string
          format: uri
          readOnly: true
          nullable: true
        verified:
          type: boolean
          readOnly: true
      required:
      - certificate_number
      - certificate_type
      - expires_at
      - file_url
      - id
      - issued_at
      - issued_by
      - mentor_profile
      - verified
    MentorCertificateCreate:
      type: object
      description: |-
        Serializer for creating mentor certificates.
        Excludes read-only fields like 'id' and 'verified'.
      properties:
        mentor_profile:
          type: integer
        certificate_type:
          type: integer
        certificate_number:
          type: string
          nullable: true
          maxLength: 255
        issued_by:
          type: string
          maxLength: 255
