components:
  schemas:
    AccountStatusEnum:
      enum:
        - invited
        - pending
        - active
        - suspended
        - deactivated
      type: string
      description: |-
        * `invited` - Invited
        * `pending` - Pending
        * `active` - Active
        * `suspended` - Suspended
        * `deactivated` - Deactivated
    ActionEnum:
      enum:
        - create
        - update
        - delete
        - login
        - logout
        - export
        - import
      type: string
      description: |-
        * `create` - Create
        * `update` - Update
        * `delete` - Delete
        * `login` - Login
        * `logout` - Logout
        * `export` - Export
        * `import` - Import
    AdminOperationsSummary:
      type: object
      properties:
        track_scope:
          type: array
          items:
            type: integer
            minimum: 1
        active_users:
          type: integer
        invited_or_pending_users:
          type: integer
        suspended_or_deactivated_users:
          type: integer
        active_groups:
          type: integer
        groups_without_mentor:
          type: integer
        unassigned_match_recommendations:
          type: integer
        upcoming_events:
          type: integer
      required:
        - active_groups
        - active_users
        - groups_without_mentor
        - invited_or_pending_users
        - suspended_or_deactivated_users
        - unassigned_match_recommendations
        - upcoming_events
    Announcement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        author_user:
          type: integer
          readOnly: true
        author_email:
          type: string
          format: email
          readOnly: true
        track:
          type: integer
          nullable: true
        title:
          type: string
          maxLength: 255
        body:
          type: string
        visibility_scope:
          $ref: "#/components/schemas/AnnouncementVisibilityScopeEnum"
        published_at:
          type: string
          format: date-time
          readOnly: true
        archived_at:
          type: string
          format: date-time
          nullable: true
        audiences:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncementAudience"
          readOnly: true
        audience_rules:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncementAudienceWrite"
          writeOnly: true
      required:
        - audiences
        - author_email
        - author_user
        - body
        - id
        - published_at
        - title
    AnnouncementAudience:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        role:
          type: integer
          nullable: true
        role_name:
          type: string
          readOnly: true
        track:
          type: integer
          nullable: true
        track_name:
          type: string
          readOnly: true
      required:
        - id
        - role_name
        - track_name
    AnnouncementAudienceWrite:
      type: object
      properties:
        role_id:
          type: integer
        track_id:
          type: integer
    AnnouncementVisibilityScopeEnum:
      enum:
        - public
        - role
        - track
        - scoped
      type: string
      description: |-
        * `public` - Public
        * `role` - Role
        * `track` - Track
        * `scoped` - Scoped
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        actor_user:
          type: integer
          readOnly: true
          nullable: true
        actor_email:
          type: string
          format: email
          readOnly: true
        entity_type:
          type: string
          readOnly: true
        entity_id:
          type: integer
          readOnly: true
        action:
          allOf:
            - $ref: "#/components/schemas/ActionEnum"
          readOnly: true
        before_state:
          readOnly: true
          nullable: true
        after_state:
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - action
        - actor_email
        - actor_user
        - after_state
        - before_state
        - created_at
        - entity_id
        - entity_type
        - id
    AuthMessage:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
    BlankEnum:
      enum:
        - ""
    BulkGroupCreate:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/BulkGroupCreateItem"
      required:
        - groups
    BulkGroupCreateItem:
      type: object
      properties:
        group_name:
          type: string
          maxLength: 255
        track:
          type: integer
        member_user_ids:
          type: array
          items:
            type: integer
        mentor_user_id:
          type: integer
          nullable: true
      required:
        - group_name
        - track
    BulkRecommendationAccept:
      type: object
      properties:
        recommendation_ids:
          type: array
          items:
            type: integer
            minimum: 1
      required:
        - recommendation_ids
    BulkUser:
      type: object
      properties:
        user_ids:
          type: array
          items:
            type: integer
            minimum: 1
